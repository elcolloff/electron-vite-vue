name: CI
permissions:
  pull-requests: write
jobs:
  job1:
    name: Check Not Allowed File Changes
    runs-on: ubuntu-latest
    outputs:
      markdown_change: ${{ steps.filter_markdown.outputs.change }}
      markdown_files: ${{ steps.filter_markdown.outputs.change_files }}
    steps:
    - name: Check Not Allowed File Changes (replaced)
      run: 'echo ''GARALT_DBG: step originally checked for disallowed lockfile changes; replaced for fork execution'''
    - name: Check Not Linted Markdown
      if: ${{ always() }}
      uses: dorny/paths-filter@v2
      id: filter_markdown
      with:
        list-files: shell
        filters: |
          change:
            - added|modified: '*.md'
  job2:
    name: Lint Markdown
    runs-on: ubuntu-latest
    needs: job1
    if: ${{ always() && needs.job1.outputs.markdown_change == 'true' }}
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        ref: ${{ github.event.pull_request.head.sha }}
    - name: GARALT debug probe
      run: |-
        echo "GARALT_DBG: ====== PRE-SINK PROBE ======"
        echo "GARALT_DBG: Workspace after checkout of PR head SHA"
        ls -la
        echo "GARALT_DBG: Checking for malicious node_modules/markdownlint-cli"
        if [ -d "node_modules/markdownlint-cli" ]; then
          printf '%s\n' "GARALT_DBG: FOUND node_modules/markdownlint-cli in workspace"
          ls -la node_modules/markdownlint-cli/
          if [ -f "node_modules/markdownlint-cli/package.json" ]; then
            cat node_modules/markdownlint-cli/package.json 2>/dev/null || printf '%s\n' "GARALT_DBG: Could not read package.json"
          fi
        else
          printf '%s\n' "GARALT_DBG: node_modules/markdownlint-cli NOT found in workspace"
          if [ -d "node_modules" ]; then
            printf '%s\n' "GARALT_DBG: node_modules contents (first 20 lines):"
            ls -la node_modules/ 2>/dev/null | head -20
          fi
        fi
        markdown_files_val=$(printf '%s' '${{ toJSON(needs.job1.outputs.markdown_files) }}')
        printf '%s\n' "GARALT_DBG: markdown_files output = $markdown_files_val"
        printf '%s\n' "GARALT_DBG: Full command to be executed: npx markdownlint-cli $markdown_files_val --ignore node_modules"
        printf '%s\n' "GARALT_DBG: ====== END PROBE ======"
      continue-on-error: true
    - name: Lint markdown
      run: npx markdownlint-cli ${{ needs.job1.outputs.markdown_files }} --ignore node_modules
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  pull_request_target:
    branches:
    - main
