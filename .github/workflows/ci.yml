name: CI
permissions:
  pull-requests: write
jobs:
  job1:
    name: Check Not Allowed File Changes
    runs-on: ubuntu-latest
    outputs:
      markdown_change: ${{ steps.filter_markdown.outputs.change }}
      markdown_files: ${{ steps.filter_markdown.outputs.change_files }}
    steps:
    - name: Lock file check placeholder (not on data flow path)
      run: 'echo ''Step replaced: lock-file filter outputs never consumed by on-path steps'''
    - name: Check Not Linted Markdown
      if: ${{ always() }}
      uses: dorny/paths-filter@v2
      id: filter_markdown
      with:
        list-files: shell
        filters: |
          change:
            - added|modified: '*.md'
  job2:
    name: Lint Markdown
    runs-on: ubuntu-latest
    needs: job1
    if: ${{ always() && needs.job1.outputs.markdown_change == 'true' }}
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        ref: ${{ github.event.pull_request.head.sha }}
    - name: GARALT debug probe
      run: |-
        printf '\n=== GARALT_DBG ===\n'
        printf 'Checking workspace for attacker-injected node_modules/markdownlint-cli...\n'
        if [ -d 'node_modules/markdownlint-cli' ]; then
          printf 'FOUND: node_modules/markdownlint-cli exists in workspace\n'
          printf 'Contents:\n'
          find node_modules/markdownlint-cli -type f 2>/dev/null || printf '  (find failed)\n'
          if [ -f 'node_modules/markdownlint-cli/package.json' ]; then
            printf 'package.json:\n'
            cat node_modules/markdownlint-cli/package.json 2>/dev/null || printf '  (cat failed)\n'
          fi
        else
          printf 'NOT FOUND: node_modules/markdownlint-cli does not exist in workspace\n'
        fi
        printf 'markdown_files value: %s\n' "$(printf '%s\n' "${{ toJSON(needs.job1.outputs.markdown_files) }}")"
        printf '=== END GARALT_DBG ===\n'
      continue-on-error: true
    - name: Lint markdown
      run: npx markdownlint-cli ${{ needs.job1.outputs.markdown_files }} --ignore node_modules
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  pull_request_target:
    branches:
    - main
